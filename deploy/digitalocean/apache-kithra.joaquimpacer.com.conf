<VirtualHost *:80>
    ServerName kithra.joaquimpacer.com

    DocumentRoot /var/www/kithra

    <Directory /var/www/kithra>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorDocument 404 /index.html

    ErrorLog ${APACHE_LOG_DIR}/kithra.joaquimpacer.com-error.log
    CustomLog ${APACHE_LOG_DIR}/kithra.joaquimpacer.com-access.log combined
</VirtualHost>
