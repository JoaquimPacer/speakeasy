<VirtualHost *:80>
    ServerName api.joaquimpacer.com

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass / http://127.0.0.1:8080/ timeout=300
    ProxyPassReverse / http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "http"
    LimitRequestBody 536870912

    ErrorLog ${APACHE_LOG_DIR}/api.joaquimpacer.com-error.log
    CustomLog ${APACHE_LOG_DIR}/api.joaquimpacer.com-access.log combined
</VirtualHost>
